<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Dynasty — Leaderboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#eef0f5;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{text-decoration:none}

/* NAV */
.nav{display:flex;align-items:center;gap:16px;padding:14px 32px;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100;background:#0f1117}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:#eef0f5}
.nav-logo span{color:#f59e0b}
.nav-beta{font-size:9px;font-weight:700;color:#f59e0b;background:rgba(217,119,6,0.12);border:1px solid rgba(37,99,235,0.25);border-radius:4px;padding:2px 6px;letter-spacing:.06em}
.nav-links{display:flex;gap:4px;margin-left:auto;align-items:center}
.nav-btn{font-size:12px;font-weight:600;color:#6b7280;background:none;border:1px solid transparent;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{color:#eef0f5;background:rgba(255,255,255,0.04)}
.nav-btn.active{background:rgba(217,119,6,0.12);border-color:rgba(217,119,6,0.3);color:#fbbf24}


/* PAGE */
.page{max-width:760px;margin:0 auto;padding:48px 24px}
.page-title{font-size:28px;font-weight:800;color:#eef0f5;margin-bottom:6px}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:32px}

/* SEASON BADGE */
.season-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:6px 14px;font-size:12px;color:#fbbf24;font-family:monospace;margin-bottom:28px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:28px}
.search-input{width:100%;background:#13161f;border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 16px 12px 42px;font-size:13px;color:#eef0f5;font-family:inherit;outline:none;transition:border .15s}
.search-input:focus{border-color:rgba(245,158,11,0.5)}
.search-input::placeholder{color:#5a6278}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#5a6278}

/* LEADERBOARD TABLE */
.lb-card{background:#0a192f;border:1px solid rgba(255,255,255,0.09);border-radius:14px;overflow:hidden;margin-bottom:20px}
.lb-header{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 80px;gap:0;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.lb-header span{font-size:9px;font-weight:700;letter-spacing:.12em;color:#5a6278;font-family:monospace;text-transform:uppercase}
.lb-header span:not(:first-child){text-align:right}

.lb-row{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 80px;gap:0;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background .12s;align-items:center}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,0.04)}
.lb-row.me{background:rgba(245,158,11,0.08);border-left:3px solid #f59e0b}
.lb-row.top3{background:rgba(234,179,8,0.04)}

.rank{font-size:14px;font-weight:800;color:#6b7280;font-family:monospace}
.rank.gold{color:#f59e0b}
.rank.silver{color:#94a3b8}
.rank.bronze{color:#b45309}

.player-info{min-width:0}
.player-name{font-size:13px;font-weight:700;color:#eef0f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-tier{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:1px 7px;margin-top:3px;font-family:monospace}

.lb-stat{font-size:13px;font-weight:600;color:#fbbf24;font-family:monospace;text-align:right}
.lb-stat.pts{font-size:15px;font-weight:800;color:#eef0f5}

/* MY RANK (if outside top 10) */
.my-rank-card{background:rgba(245,158,11,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.my-rank-label{font-size:12px;color:#6b7280;margin-bottom:2px}
.my-rank-val{font-size:18px;font-weight:800;color:#fbbf24;font-family:monospace}

/* EMPTY / LOADING */
.empty{text-align:center;padding:48px 0;color:#5a6278;font-size:13px;font-family:monospace}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.08);border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MEDALS */
.medal{font-size:18px;line-height:1}

@media(max-width:600px){
  .page{padding:24px 12px}
  /* Nav — wrap */
  .nav-links{gap:3px;flex-wrap:wrap;justify-content:center}
  .nav-btn{font-size:11px;padding:5px 8px}
  /* Collapse stat columns — show rank, name, points only */
  .lb-header{grid-template-columns:40px 1fr 70px}
  .lb-row{grid-template-columns:40px 1fr 70px}
  .lb-header span:nth-child(n+4),
  .lb-row div:nth-child(n+4){display:none}
  .lb-stat.pts{font-size:13px}
  /* My rank card */
  .my-rank-card{flex-wrap:wrap;gap:10px}
  /* Search */
  .search-input{font-size:13px}
}
@media(max-width:400px){
  .lb-header{grid-template-columns:36px 1fr 60px}
  .lb-row{grid-template-columns:36px 1fr 60px}
  .lb-row{padding:12px 12px}
  .page-title{font-size:22px}
  .nav-btn{font-size:10px;padding:4px 6px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><div style="width:28px;height:28px;background:linear-gradient(135deg,#c47f09,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px">⚡</div><span>ARC <span>Dynasty</span></span><span class="nav-beta">BETA</span></div>
  <div class="nav-links">
    <a href="index.html"><button class="nav-btn">Home</button></a>
    <a href="dynastyiq-vote.html"><button class="nav-btn">Vote</button></a>
    <a href="dynastyiq-analyze.html"><button class="nav-btn">Analyze</button></a>
    <a href="dynastyiq-faq.html"><button class="nav-btn">FAQ</button></a>
    <button class="nav-btn active">Leaderboard</button>
    <div id="arc-nav-badge-wrap"></div>
  </div>
</nav>

<div class="page">
  <div class="page-title">Season Leaderboard</div>
  <div class="page-sub">Top dynasty analysts ranked by community contribution points</div>

  <div id="season-badge" class="season-badge" style="display:none">
    🏆 <span id="season-name">2026 Offseason</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Search top 50 by username..." oninput="filterRows(this.value)">
  </div>

  <div id="my-rank-card" class="my-rank-card" style="display:none">
    <div>
      <div class="my-rank-label">YOUR RANK</div>
      <div class="my-rank-val">#<span id="my-rank-num">—</span></div>
    </div>
    <div style="text-align:right">
      <div class="my-rank-label">YOUR POINTS</div>
      <div class="my-rank-val"><span id="my-rank-pts">0</span> pts</div>
    </div>
    <div style="text-align:right">
      <div class="my-rank-label">TIER</div>
      <div id="my-rank-tier" style="font-size:13px;font-weight:700;margin-top:2px"></div>
    </div>
  </div>

  <div class="lb-card">
    <div class="lb-header">
      <span>#</span>
      <span>Player</span>
      <span>Points</span>
      <span>Votes</span>
      <span>Outcomes</span>
      <span>Submits</span>
    </div>
    <div id="lb-body">
      <div class="empty"><div class="spinner"></div>Loading leaderboard…</div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://arc-two-mu.vercel.app/api";

function getDeviceId() {
  let id = localStorage.getItem('diq_device_id');
  if(!id){
    id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
      const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
    });
    localStorage.setItem('diq_device_id', id);
  }
  return id;
}

const TIER_COLORS = {
  commissioner:    '#a855f7',
  dynasty_builder: '#f59e0b',
  league_winner:   '#eab308',
  starter:         '#22c55e',
  depth_chart:     '#f59e0b',
  waiver_wire:     '#6b7280',
};

const MEDALS = ['🥇','🥈','🥉'];

let allRows = [];

function tierBadge(tier) {
  if(!tier) return '';
  const clr = TIER_COLORS[tier.key] || '#6b7280';
  return `<span class="player-tier" style="color:${clr};background:${clr}18;border:1px solid ${clr}33">${tier.label}</span>`;
}

function rowHTML(entry) {
  const isMe = entry.is_me;
  const isTop3 = entry.rank <= 3;
  const rankDisplay = entry.rank <= 3
    ? `<span class="medal">${MEDALS[entry.rank-1]}</span>`
    : `<span class="rank ${entry.rank===1?'gold':entry.rank===2?'silver':entry.rank===3?'bronze':''}">#${entry.rank}</span>`;

  const outsideTop10 = entry.rank > 10;
  return `<div class="lb-row${isMe?' me':''}${isTop3?' top3':''}" data-name="${(entry.display_name||'').toLowerCase()}"
    style="${outsideTop10 && !isMe ? 'opacity:0.7' : ''}">
    <div>${rankDisplay}</div>
    <div class="player-info">
      <div class="player-name">${entry.display_name || 'Anonymous'}${isMe?' <span style="font-size:10px;color:#f59e0b">(you)</span>':''}</div>
      ${tierBadge(entry.tier)}
    </div>
    <div class="lb-stat pts">${entry.points}</div>
    <div class="lb-stat">${entry.votes_cast ?? 0}</div>
    <div class="lb-stat">${entry.outcomes_logged ?? 0}</div>
    <div class="lb-stat">${entry.trades_submitted ?? 0}</div>
  </div>`;
}

function filterRows(q) {
  const lower = q.toLowerCase().trim();
  const body = document.getElementById('lb-body');
  if(!lower) {
    body.innerHTML = renderWithDivider(allRows);
    return;
  }
  const filtered = allRows.filter(r => (r.display_name||'').toLowerCase().includes(lower));
  if(!filtered.length) {
    body.innerHTML = `<div class="empty">No users found matching "${q}"</div>`;
  } else {
    body.innerHTML = filtered.map(rowHTML).join('');
  }
}

function renderWithDivider(rows) {
  const top10 = rows.filter(r => r.rank <= 10);
  const rest  = rows.filter(r => r.rank > 10);
  let html = top10.map(rowHTML).join('');
  if(rest.length) {
    html += `<div style="padding:8px 20px;font-size:9px;color:#5a6278;font-family:monospace;
      letter-spacing:.1em;border-top:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.03)">— ALSO ON THE BOARD —</div>`;
    html += rest.map(rowHTML).join('');
  }
  return html;
}

async function loadLeaderboard() {
  try {
    const r = await fetch(`${API_BASE}/achievements`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ device_id: getDeviceId(), action: 'get_leaderboard' }),
    });
    const d = await r.json();

    if(d.season) {
      document.getElementById('season-name').textContent = d.season.name;
      document.getElementById('season-badge').style.display = 'inline-flex';
    }

    allRows = d.leaderboard || [];
    document.getElementById('lb-body').innerHTML = allRows.length
      ? renderWithDivider(allRows)
      : '<div class="empty">No scores yet this season — start voting to appear here!</div>';

    // Show my rank card if outside top 10
    if(d.my_rank) {
      document.getElementById('my-rank-num').textContent = d.my_rank.rank;
      document.getElementById('my-rank-pts').textContent = d.my_rank.points;
      const tierEl = document.getElementById('my-rank-tier');
      if(d.my_rank.tier) {
        const clr = TIER_COLORS[d.my_rank.tier.key] || '#6b7280';
        tierEl.style.color = clr;
        tierEl.textContent = d.my_rank.tier.label;
      }
      document.getElementById('my-rank-card').style.display = 'flex';
    }

  } catch(e) {
    document.getElementById('lb-body').innerHTML =
      '<div class="empty">Could not load leaderboard — try again shortly</div>';
  }
}

loadLeaderboard();
</script>
<script src="arc-profile.js"></script>
</body>
</html>
